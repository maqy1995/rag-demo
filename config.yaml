# ───── RAG demo config example ─────
# Copy to config.yaml and edit. .env.example 是敏感字段（API key），
# 这里的非敏感字段独立管理。

# 空 vault → cold-start 自动 fallback 到 data/raw.sample/ 5 篇
vault:
  path: "/Users/maqy/code/data"
  name: "huozhe"
  include_extensions: [".md", ".txt"]

# provider 列表见 docs/adr/0003-llm-embedding-source.md
# 这里只列最常用的一组；其余字段（chunk_size / top_k 等）走内置默认
generate:
  llm:
    provider: "minimax"
    model: "MiniMax-M3"
    base_url: "https://api.MiniMax.chat/v1/"
    api_key_env: "MIMAX_API_KEY"   # 从 .env 哪个字段读 key (ADR-0003 锁定)
  embedding:
    provider: "zhipu"
    model: "embedding-3"
    base_url: "https://open.bigmodel.cn/api/paas/v4/"
    api_key_env: "ZHIPU_API_KEY"   # 从 .env 哪个字段读 key (ADR-0003 锁定)
